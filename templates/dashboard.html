<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            margin: 40px;
            background-color: #f4f4f4;
        }

        h1{
            color: #2c3e50;
        }

        .card{
            background: white;
            padding: 20px;
            margin: 15px 0;
            border-radius: 10px;
            box-shadow: 0px 2px 5px rgba(0,0,0,0.2);
        }

        a{
            text-decoration: none;
            padding: 10px 15px;
            background: #2c3e50;
            color: white;
            border-radius: 5px;
            margin-right: 10px;
        }
    </style>

</head>
<body>

<h1>Student Analytics Dashboard</h1>

<div class="card">
    <h2>Total Entries</h2>
    <h3>{{ total_entries }}</h3>
</div>

<div class="card">
    <h2>Average Productivity</h2>
    <h3>{{ "%.2f"|format(avg_productivity or 0) }}</h3>
</div>

<div class="card">
    <h2>Highest Productivity</h2>
    <h3>{{ max_productivity }}</h3>
</div>

<div class="card">
    <h2>Lowest Productivity</h2>
    <h3>{{ min_productivity }}</h3>
</div>

<br>

<a href="/">Home</a>
<a href="/history">History</a>

</body>
</html>
